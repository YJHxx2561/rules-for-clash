  - {name: 🇭🇰 香港节点, type: select, proxies: [🇭🇰 香港手动, ♻️ 香港自动]}
  - {name: 🇯🇵 日本节点, type: select, proxies: [🇯🇵 日本手动, ♻️ 日本自动]}
  - {name: 🇸🇬 加坡节点, type: select, proxies: [🇸🇬 加坡手动, ♻️ 加坡自动]}
  - {name: 🇺🇲 美国节点, type: select, proxies: [🇺🇲 美国手动, ♻️ 美国自动]}
