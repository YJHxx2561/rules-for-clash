  - {name: 🇯🇵 日本手动, type: select, include-all: true, filter: "(?=.*(日|JP|jp|(?i)Japan))^((?!(落地|港|台|韩|新|美)).)*$"}
  - {name: 🇸🇬 加坡手动, type: select, include-all: true, filter: "(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(落地|港|台|韩|日|美)).)*$"}
  - {name: 🇺🇲 美国手动, type: select, include-all: true, filter: "(?=.*(美|US|(?i)States|America))^((?!(落地|港|台|日|韩|新)).)*$"}
  - {name: 自建手动, type: select, include-all: true, filter: "(?=.*(自建))^((?!(落地)).)*$"}

  - {name: ♻️ 香港自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(港|HK|(?i)Hong))^((?!(落地|台|日|韩|新|深|美)).)*$"}
  - {name: ♻️ 日本自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(日|JP|jp|(?i)Japan))^((?!(落地|港|台|韩|新|美)).)*$" }
  - {name: ♻️ 加坡自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(落地|港|台|韩|日|美)).)*$" }
  - {name: ♻️ 美国自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(美|US|(?i)States|America))^((?!(落地|港|台|日|韩|新)).)*$"}
  - {name: 自建自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(自建))^((?!(落地)).)*$"}
  - {name: ♻️ 自动选择, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "^((?!(直连)).)*$"}

  - {name: 🌐 全部节点, type: select, include-all: true}

    
